name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Re-sync now" button in the Actions tab
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC — picks up new repos

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Do NOT cancel an in-progress deploy: let it finish so a
# code push is never silently killed by a data auto-commit (overrides.json). A
# newer run just queues; GitHub keeps only the latest pending one, so the final
# deploy still reflects the newest commit.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Full GitHub sync (authenticated) -> public/projects.json
      - name: Sync projects from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # page_url comes from whichever attempt succeeded
      url: ${{ steps.a1.outputs.page_url || steps.a2.outputs.page_url || steps.a3.outputs.page_url }}
    steps:
      # actions/deploy-pages occasionally hits a transient "Deployment failed,
      # try again later" from the Pages backend. Retry up to 3x with backoff so
      # a flake doesn't fail the whole run.
      - id: a1
        name: Deploy to GitHub Pages (attempt 1)
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.a1.outcome == 'failure'
        run: sleep 20
      - id: a2
        name: Deploy to GitHub Pages (attempt 2)
        if: steps.a1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.a1.outcome == 'failure' && steps.a2.outcome == 'failure'
        run: sleep 30
      - id: a3
        name: Deploy to GitHub Pages (attempt 3)
        if: steps.a1.outcome == 'failure' && steps.a2.outcome == 'failure'
        uses: actions/deploy-pages@v4
